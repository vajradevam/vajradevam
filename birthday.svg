<svg xmlns="http://www.w3.org/2000/svg" width="646" height="798" viewBox="0 0 646 798" font-family="monospace">
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#ff3cac"/>
      <stop offset="20%" stop-color="#ff8a3c"/>
      <stop offset="40%" stop-color="#ffe53c"/>
      <stop offset="60%" stop-color="#3cff9e"/>
      <stop offset="80%" stop-color="#3cb0ff"/>
      <stop offset="100%" stop-color="#b15cff"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-1 0" to="1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0221"/>
      <stop offset="50%" stop-color="#1a0938"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd1f5"/>
      <stop offset="100%" stop-color="#c9e4ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="646" height="798" rx="22" fill="url(#bg)"/>
  <rect x="6" y="6" width="634" height="786" rx="18" fill="none"
        stroke="url(#rainbow)" stroke-width="2.5" opacity="0.8"/>

